name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: fmt
        run: cargo fmt --all -- --check
      - name: test
        run: cargo test
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88
      - name: cargo check (MSRV)
        run: cargo check --workspace --locked --all-targets

  style:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ruff
        uses: astral-sh/ruff-action@v3
        with:
          version: "0.15.x"
      - name: ruff check
        run: ruff check tools/
      - name: ruff format --check
        run: ruff format --check tools/

      - name: Install formatters
        env:
          SHFMT_VERSION: v3.13.1
          TAPLO_VERSION: 0.10.0
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL "https://github.com/mvdan/sh/releases/download/${SHFMT_VERSION}/shfmt_${SHFMT_VERSION}_linux_amd64" \
            -o "$HOME/.local/bin/shfmt"
          curl -fsSL "https://github.com/tamasfe/taplo/releases/download/${TAPLO_VERSION}/taplo-linux-x86_64.gz" \
            | gunzip > "$HOME/.local/bin/taplo"
          chmod +x "$HOME/.local/bin/shfmt" "$HOME/.local/bin/taplo"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: shfmt
        run: shfmt -d -i 2 -ci scripts/*.sh .githooks/pre-commit .githooks/commit-msg

      - name: shellcheck
        run: shellcheck -S style scripts/*.sh .githooks/pre-commit .githooks/commit-msg

      - name: taplo fmt --check
        run: taplo fmt --check

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Generate coverage (Codecov format)
        run: cargo llvm-cov --workspace --codecov --output-path codecov.json
      - name: Coverage summary
        run: cargo llvm-cov report --summary-only
      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: codecov.json
          fail_ci_if_error: false
